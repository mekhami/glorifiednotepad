# Nginx configuration for glorifiednotepad.net
# Location: /etc/nginx/sites-available/glorifiednotepad.net

upstream phoenix {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    listen [::]:80;
    server_name glorifiednotepad.net www.glorifiednotepad.net;

    # Let's Encrypt will modify this file to add SSL configuration
    # Once certbot runs, this will redirect to HTTPS

    access_log /var/log/nginx/glorifiednotepad_access.log;
    error_log /var/log/nginx/glorifiednotepad_error.log;

    location / {
        proxy_pass http://phoenix;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts for LiveView connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Serve static files directly
    location ~* ^.+\.(css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://phoenix;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
